name: Deploy Backend to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Planeroo.sln

      - name: Build
        run: dotnet build Planeroo.sln --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish src/Planeroo.API/Planeroo.API.csproj \
            --configuration Release \
            --output ./publish \
            --no-restore

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "publish/*"
          target: "/var/www/planeroo-api"
          strip_components: 1

      - name: Restart service on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            systemctl restart planeroo-api
            sleep 3
            systemctl status planeroo-api --no-pager
            echo "✅ Deployment complete"
